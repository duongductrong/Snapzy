name: CI Build Check

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: macos-15
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Setup Secrets.xcconfig
        run: |
          cat > Snapzy/Config/Secrets.xcconfig << 'EOF'
          POLAR_ORG_ID = ${{ secrets.POLAR_ORG_ID }}
          POLAR_API_BASE_URL = https:/$()/api.polar.sh/v1/customer-portal
          POLAR_SANDBOX_API_BASE_URL = https:/$()/sandbox-api.polar.sh/v1/customer-portal
          EOF

      - name: Build
        run: |
          set -euo pipefail
          mkdir -p build

          if ! xcodebuild \
            -project Snapzy.xcodeproj \
            -scheme Snapzy \
            -configuration Release \
            -derivedDataPath build/DerivedData \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            ONLY_ACTIVE_ARCH=NO \
            build > build/ci-build.log 2>&1; then
            tail -100 build/ci-build.log
            exit 1
          fi

          tail -20 build/ci-build.log

      - name: Verify app bundle
        run: |
          APP_PATH="build/DerivedData/Build/Products/Release/Snapzy.app"
          if [ ! -d "$APP_PATH" ]; then
            echo "::error::Snapzy.app not found at expected path"
            exit 1
          fi
          echo "Build successful: $APP_PATH"
