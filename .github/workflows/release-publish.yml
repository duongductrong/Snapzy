name: Release Publish

on:
  pull_request:
    types: [closed]
    branches: [master]

concurrency:
  group: release-publish
  cancel-in-progress: false

jobs:
  publish:
    # Only run when a release PR is merged (not just closed)
    if: >-
      github.event.pull_request.merged == true &&
      startsWith(github.event.pull_request.head.ref, 'release/v')
    runs-on: macos-15
    timeout-minutes: 30
    permissions:
      contents: write
    env:
      HAS_DEVELOPER_ID_CERT: ${{ secrets.DEVELOPER_ID_P12 != '' && secrets.DEVELOPER_ID_PASSWORD != '' && 'true' || 'false' }}
      HAS_SELF_SIGNED_CERT: ${{ secrets.SELF_SIGNED_CERT_P12 != '' && secrets.SELF_SIGNED_CERT_PASSWORD != '' && 'true' || 'false' }}
      HAS_NOTARIZATION_CREDENTIALS: ${{ secrets.APPLE_ID != '' && secrets.APPLE_ID_PASSWORD != '' && secrets.APPLE_TEAM_ID != '' && 'true' || 'false' }}
      HAS_SPARKLE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY != '' && 'true' || 'false' }}
      EXPECTED_RELEASE_CERT_SHA256: ${{ secrets.EXPECTED_RELEASE_CERT_SHA256 }}

    steps:
      - name: Extract version
        id: version
        run: |
          BRANCH="${{ github.event.pull_request.head.ref }}"
          VERSION="${BRANCH#release/v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Release version: v${VERSION}"

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: master
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract changelog
        id: changelog
        run: |
          mkdir -p build
          # Extract the latest version entry from CHANGELOG.md
          awk '/^## \[/{if(found) exit; found=1; next} found' CHANGELOG.md > build/changelog.md
          echo "changelog_path=build/changelog.md" >> "$GITHUB_OUTPUT"
          echo "--- Changelog content ---"
          cat build/changelog.md

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "26.2"

      - name: Build archive
        run: |
          set -euo pipefail
          mkdir -p build

          if ! xcodebuild archive \
            -project Snapzy.xcodeproj \
            -scheme Snapzy \
            -configuration Release \
            -archivePath build/Snapzy.xcarchive \
            -derivedDataPath build/DerivedData \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            ONLY_ACTIVE_ARCH=NO \
            > build/archive.log 2>&1; then
            tail -100 build/archive.log
            exit 1
          fi

          tail -20 build/archive.log

          if [ ! -d "build/Snapzy.xcarchive" ]; then
            echo "::error::Archive not found at build/Snapzy.xcarchive"
            exit 1
          fi

      - name: Enforce stable signing identity for public release
        run: |
          set -euo pipefail
          if [ "${HAS_DEVELOPER_ID_CERT}" != "true" ] && [ "${HAS_SELF_SIGNED_CERT}" != "true" ]; then
            echo "::error::Public Sparkle releases require a stable signing identity (Developer ID or approved self-signed cert). Ad-hoc signing is blocked."
            exit 1
          fi

      # --- Code Signing (conditional) ---
      # Priority: Developer ID > Self-signed cert
      # Ad-hoc signing is intentionally blocked for public Sparkle releases.
      - name: Import signing certificate
        if: env.HAS_DEVELOPER_ID_CERT == 'true' || env.HAS_SELF_SIGNED_CERT == 'true'
        env:
          DEVELOPER_ID_P12: ${{ secrets.DEVELOPER_ID_P12 }}
          DEVELOPER_ID_PASSWORD: ${{ secrets.DEVELOPER_ID_PASSWORD }}
          SELF_SIGNED_CERT_P12: ${{ secrets.SELF_SIGNED_CERT_P12 }}
          SELF_SIGNED_CERT_PASSWORD: ${{ secrets.SELF_SIGNED_CERT_PASSWORD }}
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          KEYCHAIN_PASSWORD=$(uuidgen)
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          if [ "${HAS_DEVELOPER_ID_CERT}" = "true" ]; then
            echo "Importing Developer ID certificate..."
            echo "$DEVELOPER_ID_P12" | base64 --decode > $RUNNER_TEMP/certificate.p12
            security import $RUNNER_TEMP/certificate.p12 -P "$DEVELOPER_ID_PASSWORD" \
              -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          elif [ "${HAS_SELF_SIGNED_CERT}" = "true" ]; then
            echo "Importing self-signed certificate (TCC-preserving fallback)..."
            echo "$SELF_SIGNED_CERT_P12" | base64 --decode > $RUNNER_TEMP/certificate.p12
            security import $RUNNER_TEMP/certificate.p12 -P "$SELF_SIGNED_CERT_PASSWORD" \
              -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH" -T /usr/bin/codesign
            # Note: no `security add-trusted-cert` here — it requires interactive admin
            # password and hangs in CI. The -A and -T flags are sufficient for codesign.
          fi

          security list-keychain -d user -s "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Log the signing identity that will be used
          echo "Available signing identities:"
          security find-identity -v -p codesigning "$KEYCHAIN_PATH"

      - name: Export app
        run: |
          set -euo pipefail
          mkdir -p build build/export
          ARCHIVE_PATH="build/Snapzy.xcarchive"

          if [ ! -d "$ARCHIVE_PATH" ]; then
            echo "::error::Archive not found at $ARCHIVE_PATH. Check the Build archive step output."
            exit 1
          fi

          if [ "${HAS_DEVELOPER_ID_CERT}" = "true" ]; then
            # Signed export via Xcode (Developer ID)
            cat > build/ExportOptions.plist << 'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>developer-id</string>
            <key>signingStyle</key>
            <string>automatic</string>
          </dict>
          </plist>
          PLIST
            xcodebuild -exportArchive \
              -archivePath "$ARCHIVE_PATH" \
              -exportPath build/export \
              -exportOptionsPlist build/ExportOptions.plist
          else
            # Manual export - copy from archive and sign the full bundle
            ditto "$ARCHIVE_PATH/Products/Applications/Snapzy.app" build/Snapzy.app

            APP_PATH="build/Snapzy.app"
            SPARKLE_FRAMEWORK="$APP_PATH/Contents/Frameworks/Sparkle.framework"

            # Determine signing identity:
            #   Self-signed cert -> stable identity -> permissions persist across updates
            if [ "${HAS_SELF_SIGNED_CERT}" = "true" ]; then
              SIGN_IDENTITY="Snapzy Self-Signed"
              echo "Signing with self-signed certificate: $SIGN_IDENTITY"
            else
              echo "::error::Self-signed certificate is required when Developer ID export is unavailable."
              exit 1
            fi

            # Sign Sparkle components inside-out per official docs
            # See: https://sparkle-project.org/documentation/sandboxing/#code-signing
            if [ -d "$SPARKLE_FRAMEWORK/Versions/B/XPCServices/Installer.xpc" ]; then
              codesign --force --sign "$SIGN_IDENTITY" -o runtime --timestamp=none "$SPARKLE_FRAMEWORK/Versions/B/XPCServices/Installer.xpc"
            fi
            if [ -d "$SPARKLE_FRAMEWORK/Versions/B/XPCServices/Downloader.xpc" ]; then
              codesign --force --sign "$SIGN_IDENTITY" -o runtime --preserve-metadata=entitlements --timestamp=none "$SPARKLE_FRAMEWORK/Versions/B/XPCServices/Downloader.xpc"
            fi
            if [ -f "$SPARKLE_FRAMEWORK/Versions/B/Autoupdate" ]; then
              codesign --force --sign "$SIGN_IDENTITY" -o runtime --timestamp=none "$SPARKLE_FRAMEWORK/Versions/B/Autoupdate"
            fi
            if [ -d "$SPARKLE_FRAMEWORK/Versions/B/Updater.app" ]; then
              codesign --force --sign "$SIGN_IDENTITY" -o runtime --timestamp=none "$SPARKLE_FRAMEWORK/Versions/B/Updater.app"
            fi
            if [ -d "$SPARKLE_FRAMEWORK" ]; then
              codesign --force --sign "$SIGN_IDENTITY" -o runtime --timestamp=none "$SPARKLE_FRAMEWORK"
            fi

            # Pre-process entitlements: codesign does NOT substitute Xcode
            # variables like $(PRODUCT_BUNDLE_IDENTIFIER). We must do it manually
            # or Sparkle's XPC mach-lookup ports won't match (causes error 4005).
            BUNDLE_ID=$(/usr/libexec/PlistBuddy -c "Print :CFBundleIdentifier" "$APP_PATH/Contents/Info.plist")
            PROCESSED_ENTITLEMENTS="$RUNNER_TEMP/processed-entitlements.plist"
            sed "s/\$(PRODUCT_BUNDLE_IDENTIFIER)/$BUNDLE_ID/g" Snapzy/Snapzy.entitlements > "$PROCESSED_ENTITLEMENTS"
            echo "Processed entitlements with bundle ID: $BUNDLE_ID"

            codesign \
              --force \
              --sign "$SIGN_IDENTITY" \
              --entitlements "$PROCESSED_ENTITLEMENTS" \
              --timestamp=none \
              "$APP_PATH"
          fi

      - name: Verify exported app bundle
        run: |
          set -euo pipefail
          APP_PATH="build/Snapzy.app"
          if [ -d "build/export/Snapzy.app" ]; then
            APP_PATH="build/export/Snapzy.app"
          fi

          codesign --verify --deep --strict --verbose=4 "$APP_PATH"
          codesign -dv --verbose=4 "$APP_PATH"
          codesign -d --entitlements - "$APP_PATH" > build/exported-app-entitlements.plist

          if ! grep -q "com.apple.security.app-sandbox" build/exported-app-entitlements.plist; then
            echo "::error::Expected app sandbox entitlement missing from exported app"
            exit 1
          fi

      - name: Identity Continuity Check
        run: |
          set -euo pipefail
          APP_PATH="build/Snapzy.app"
          if [ -d "build/export/Snapzy.app" ]; then
            APP_PATH="build/export/Snapzy.app"
          fi

          IDENTITY_DIR="build/identity-check"
          mkdir -p "$IDENTITY_DIR"

          BUNDLE_ID=$(/usr/libexec/PlistBuddy -c "Print :CFBundleIdentifier" "$APP_PATH/Contents/Info.plist")
          if [ "$BUNDLE_ID" != "com.trongduong.snapzy" ]; then
            echo "::error::Unexpected bundle ID in release artifact: $BUNDLE_ID"
            exit 1
          fi

          CODESIGN_DV=$(codesign -dv --verbose=4 "$APP_PATH" 2>&1)
          SIGNATURE_KIND=$(printf '%s\n' "$CODESIGN_DV" | sed -n 's/^Signature=//p' | head -1)
          if [ "$SIGNATURE_KIND" = "adhoc" ]; then
            echo "::error::Ad-hoc signature detected in release artifact."
            exit 1
          fi

          DR_OUTPUT=$(codesign -d -r- "$APP_PATH" 2>&1)
          DR_LINE=$(printf '%s\n' "$DR_OUTPUT" | sed -n 's/^designated => //p' | head -1)
          AUTHORITY_SUMMARY=$(printf '%s\n' "$CODESIGN_DV" | grep '^Authority=' || true)
          TEAM_IDENTIFIER=$(printf '%s\n' "$CODESIGN_DV" | sed -n 's/^TeamIdentifier=//p' | head -1)

          rm -f "$IDENTITY_DIR"/codesign*
          (
            cd "$IDENTITY_DIR"
            codesign -d --extract-certificates "$APP_PATH" >/dev/null 2>&1
          )

          LEAF_CERT="$IDENTITY_DIR/codesign0"
          if [ ! -f "$LEAF_CERT" ]; then
            echo "::error::Failed to extract signing certificate from release artifact."
            exit 1
          fi

          CERT_SHA256=$(openssl x509 -inform DER -in "$LEAF_CERT" -noout -fingerprint -sha256 | cut -d'=' -f2 | tr -d ':')
          CERT_SHA256=$(printf '%s' "$CERT_SHA256" | tr '[:lower:]' '[:upper:]')
          EXPECTED_CERT_SHA256=$(printf '%s' "${EXPECTED_RELEASE_CERT_SHA256:-}" | tr -d ':' | tr '[:lower:]' '[:upper:]')

          if [ -n "$EXPECTED_CERT_SHA256" ] && [ "$CERT_SHA256" != "$EXPECTED_CERT_SHA256" ]; then
            echo "::error::Release certificate fingerprint drift detected. Expected $EXPECTED_CERT_SHA256, got $CERT_SHA256"
            exit 1
          fi

          {
            echo "bundle_id=$BUNDLE_ID"
            echo "signature_kind=${SIGNATURE_KIND:-unknown}"
            echo "team_identifier=${TEAM_IDENTIFIER:-unknown}"
            echo "cert_sha256=$CERT_SHA256"
            echo "designated_requirement=${DR_LINE:-unknown}"
            echo "authorities_start"
            printf '%s\n' "${AUTHORITY_SUMMARY:-none}"
            echo "authorities_end"
          } | tee "$IDENTITY_DIR/identity-continuity.txt"

      - name: Install create-dmg
        run: HOMEBREW_NO_AUTO_UPDATE=1 brew install create-dmg

      - name: Create DMG
        run: |
          set -euo pipefail
          APP_PATH="build/Snapzy.app"
          if [ -d "build/export/Snapzy.app" ]; then
            APP_PATH="build/export/Snapzy.app"
          fi

          if [ ! -d "$APP_PATH" ]; then
            echo "::error::Snapzy.app not found at expected path: $APP_PATH"
            exit 1
          fi

          DMG_NAME="Snapzy-v${{ steps.version.outputs.version }}.dmg"

          create-dmg \
            --volname "Snapzy" \
            --background "assets/dmg-background.png" \
            --window-size 660 400 \
            --icon-size 120 \
            --icon "Snapzy.app" 180 170 \
            --app-drop-link 480 170 \
            --no-internet-enable \
            "build/${DMG_NAME}" \
            "$APP_PATH"

          echo "dmg_path=build/${DMG_NAME}" >> "$GITHUB_ENV"
          echo "dmg_name=${DMG_NAME}" >> "$GITHUB_ENV"

      # --- Notarization (conditional, for when Apple Developer account is available) ---
      - name: Notarize DMG
        if: env.HAS_NOTARIZATION_CREDENTIALS == 'true'
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_ID_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          xcrun notarytool submit "${{ env.dmg_path }}" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_ID_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait
          xcrun stapler staple "${{ env.dmg_path }}"

      - name: Compute SHA256
        id: sha256
        run: |
          SHA=$(shasum -a 256 "${{ env.dmg_path }}" | awk '{print $1}')
          echo "sha256=$SHA" >> "$GITHUB_OUTPUT"
          echo "SHA-256: $SHA"

      - name: Append release artifact note
        run: |
          if [ "${HAS_DEVELOPER_ID_CERT}" = "true" ] && [ "${HAS_NOTARIZATION_CREDENTIALS}" = "true" ]; then
            NOTE="- Release artifact: Developer ID signed and notarized."
          elif [ "${HAS_DEVELOPER_ID_CERT}" = "true" ]; then
            NOTE="- Release artifact: Developer ID signed, not notarized."
          elif [ "${HAS_SELF_SIGNED_CERT}" = "true" ]; then
            NOTE="- Release artifact: self-signed certificate, not notarized. Keychain/TCC permissions persist across updates when identity is unchanged. Install to /Applications before first launch."
          else
            NOTE="- Release artifact: unknown signing mode."
          fi

          {
            printf "\n\n"
            printf "### Distribution Notes\n\n"
            printf "%s\n" "$NOTE"
          } >> build/changelog.md

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: Snapzy-v${{ steps.version.outputs.version }}
          path: ${{ env.dmg_path }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: v${{ steps.version.outputs.version }}
          body_path: ${{ steps.changelog.outputs.changelog_path }}
          draft: false
          prerelease: false
          files: ${{ env.dmg_path }}
          generate_release_notes: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract build number
        id: build
        run: |
          BUILD=$(grep -m1 'CURRENT_PROJECT_VERSION' Snapzy.xcodeproj/project.pbxproj | sed 's/.*= //' | sed 's/;.*//' | tr -d ' ')
          echo "number=$BUILD" >> "$GITHUB_OUTPUT"
          echo "Build number: $BUILD"

      - name: Sign DMG with Sparkle EdDSA key
        id: sparkle_sign
        if: env.HAS_SPARKLE_KEY == 'true'
        env:
          SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}
        run: |
          set +e  # Disable exit-on-error; we handle failures manually

          # Write private key to temp file
          PRIVATE_KEY_FILE="$RUNNER_TEMP/sparkle_private_key.pem"
          echo "$SPARKLE_PRIVATE_KEY" > "$PRIVATE_KEY_FILE"

          SIGN_UPDATE=""
          SIGNATURE=""

          # Diagnostic: show what Sparkle checkout contains
          SPARKLE_SRC="build/DerivedData/SourcePackages/checkouts/Sparkle"
          echo "--- Sparkle checkout contents ---"
          ls -la "$SPARKLE_SRC/" 2>/dev/null || echo "Sparkle checkout dir not found"

          # Strategy 1: Build sign_update from Sparkle SPM checkout
          if [ -d "$SPARKLE_SRC/sign_update" ]; then
            echo "Found sign_update source, building..."
            if swift build --package-path "$SPARKLE_SRC/sign_update" -c release; then
              BIN_PATH=$(swift build --package-path "$SPARKLE_SRC/sign_update" -c release --show-bin-path 2>/dev/null)
              SIGN_UPDATE="$BIN_PATH/sign_update"
              echo "Built sign_update at: $SIGN_UPDATE"
            else
              echo "::warning::swift build for sign_update failed"
            fi
          else
            echo "::notice::sign_update source dir not found at $SPARKLE_SRC/sign_update"
          fi

          # Strategy 2: Find pre-built sign_update in SPM artifacts
          if [ -z "$SIGN_UPDATE" ] || [ ! -x "$SIGN_UPDATE" ]; then
            echo "Searching for pre-built sign_update in artifacts..."
            SIGN_UPDATE_ALT=$(find build/DerivedData/SourcePackages/artifacts -name "sign_update" -type f 2>/dev/null | head -1)
            if [ -n "$SIGN_UPDATE_ALT" ]; then
              chmod +x "$SIGN_UPDATE_ALT" 2>/dev/null || true
              if [ -x "$SIGN_UPDATE_ALT" ]; then
                SIGN_UPDATE="$SIGN_UPDATE_ALT"
                echo "Found pre-built sign_update at: $SIGN_UPDATE"
              fi
            fi
          fi

          # Strategy 3: Find generate_appcast which can also sign
          if [ -z "$SIGN_UPDATE" ] || [ ! -x "$SIGN_UPDATE" ]; then
            echo "Searching for generate_appcast binary..."
            GEN_APPCAST=$(find build/DerivedData/SourcePackages/artifacts -name "generate_appcast" -type f 2>/dev/null | head -1)
            if [ -n "$GEN_APPCAST" ] && [ -x "$GEN_APPCAST" ]; then
              echo "Found generate_appcast at: $GEN_APPCAST"
              # generate_appcast doesn't sign individual files the same way; skip
            fi
          fi

          # Sign the DMG
          if [ -n "$SIGN_UPDATE" ] && [ -x "$SIGN_UPDATE" ]; then
            echo "Signing DMG with: $SIGN_UPDATE"
            SIGN_OUTPUT=$("$SIGN_UPDATE" "${{ env.dmg_path }}" --ed-key-file "$PRIVATE_KEY_FILE" 2>&1) || true
            echo "sign_update output: $SIGN_OUTPUT"
            SIGNATURE=$(echo "$SIGN_OUTPUT" | grep "sparkle:edSignature=" | cut -d'"' -f2)
          else
            echo "::warning::Could not find or build sign_update binary, skipping signature"
          fi

          echo "signature=$SIGNATURE" >> "$GITHUB_OUTPUT"
          rm -f "$PRIVATE_KEY_FILE"

          if [ -n "$SIGNATURE" ]; then
            echo "DMG signed successfully"
            echo "Signature: $SIGNATURE"
          else
            echo "::warning::DMG signature is empty — appcast will have no EdDSA signature"
          fi

      - name: Convert changelog to HTML for appcast
        id: release_notes
        run: |
          # Convert markdown changelog to clean HTML for Sparkle update dialog
          # Only keep Features and Bug Fixes sections (skip Chore/Contributors/Distribution Notes)
          NOTES_HTML=""
          CURRENT_SECTION=""
          IN_RELEVANT_SECTION=false

          while IFS= read -r line; do
            if echo "$line" | grep -qE '^### Features'; then
              if [ -n "$CURRENT_SECTION" ]; then
                NOTES_HTML="${NOTES_HTML}</ul>"
              fi
              NOTES_HTML="${NOTES_HTML}<h3>✨ Features</h3><ul>"
              CURRENT_SECTION="features"
              IN_RELEVANT_SECTION=true
            elif echo "$line" | grep -qE '^### Bug Fixes'; then
              if [ -n "$CURRENT_SECTION" ]; then
                NOTES_HTML="${NOTES_HTML}</ul>"
              fi
              NOTES_HTML="${NOTES_HTML}<h3>🐛 Bug Fixes</h3><ul>"
              CURRENT_SECTION="bugfixes"
              IN_RELEVANT_SECTION=true
            elif echo "$line" | grep -qE '^### '; then
              # Other sections (Chore, Contributors, etc.) — skip
              if [ -n "$CURRENT_SECTION" ]; then
                NOTES_HTML="${NOTES_HTML}</ul>"
              fi
              CURRENT_SECTION=""
              IN_RELEVANT_SECTION=false
            elif [ "$IN_RELEVANT_SECTION" = true ] && echo "$line" | grep -qE '^- '; then
              # Extract list item text, strip commit hashes and PR refs
              ITEM=$(echo "$line" | sed 's/^- *//' | sed 's/ ([a-f0-9]\{7\})$//' | sed 's/ (#[0-9]*)//g' | sed 's/^ *//')
              if [ -n "$ITEM" ]; then
                NOTES_HTML="${NOTES_HTML}<li>${ITEM}</li>"
              fi
            fi
          done < "${{ steps.changelog.outputs.changelog_path }}"

          # Close last open list
          if [ -n "$CURRENT_SECTION" ]; then
            NOTES_HTML="${NOTES_HTML}</ul>"
          fi

          # Fallback if no relevant sections found
          if [ -z "$NOTES_HTML" ]; then
            NOTES_HTML="<h3>🔧 Maintenance</h3><ul><li>Bug fixes and improvements</li></ul>"
          fi

          echo "release_notes_html=$NOTES_HTML" >> "$GITHUB_OUTPUT"

      - name: Update appcast.xml
        run: |
          chmod +x scripts/update-appcast.sh
          ./scripts/update-appcast.sh \
            "${{ steps.version.outputs.version }}" \
            "${{ steps.build.outputs.number }}" \
            "${{ env.dmg_path }}" \
            "appcast.xml" \
            "${{ steps.sparkle_sign.outputs.signature }}" \
            "${{ steps.release_notes.outputs.release_notes_html }}"

      - name: Update Homebrew cask
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          SHA="${{ steps.sha256.outputs.sha256 }}"
          sed -i '' "s/version \".*\"/version \"${VERSION}\"/" Casks/snapzy.rb
          sed -i '' "s/sha256 \".*\"/sha256 \"${SHA}\"/" Casks/snapzy.rb

      - name: Update README install version
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          sed -i '' "s|/Snapzy/v[0-9][0-9.]*\/install.sh|/Snapzy/v${VERSION}/install.sh|g" README.md

      - name: Commit appcast and cask update
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add appcast.xml Casks/snapzy.rb README.md
          git commit -m "chore: update appcast, cask, and readme for v${{ steps.version.outputs.version }}"
          git push origin master
