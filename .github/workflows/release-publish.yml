name: Release Publish

on:
  pull_request:
    types: [closed]
    branches: [master]

concurrency:
  group: release-publish
  cancel-in-progress: false

jobs:
  publish:
    # Only run when a release PR is merged (not just closed)
    if: >-
      github.event.pull_request.merged == true &&
      startsWith(github.event.pull_request.head.ref, 'release/v')
    runs-on: macos-15
    timeout-minutes: 30
    permissions:
      contents: write
    env:
      HAS_DEVELOPER_ID_CERT: ${{ secrets.DEVELOPER_ID_P12 != '' && secrets.DEVELOPER_ID_PASSWORD != '' && 'true' || 'false' }}
      HAS_NOTARIZATION_CREDENTIALS: ${{ secrets.APPLE_ID != '' && secrets.APPLE_ID_PASSWORD != '' && secrets.APPLE_TEAM_ID != '' && 'true' || 'false' }}
      HAS_SPARKLE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY != '' && 'true' || 'false' }}

    steps:
      - name: Extract version
        id: version
        run: |
          BRANCH="${{ github.event.pull_request.head.ref }}"
          VERSION="${BRANCH#release/v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Release version: v${VERSION}"

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: master
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract changelog
        id: changelog
        run: |
          mkdir -p build
          # Extract the latest version entry from CHANGELOG.md
          awk '/^## \[/{if(found) exit; found=1; next} found' CHANGELOG.md > build/changelog.md
          echo "changelog_path=build/changelog.md" >> "$GITHUB_OUTPUT"
          echo "--- Changelog content ---"
          cat build/changelog.md

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "26.2"

      - name: Build archive
        run: |
          set -euo pipefail
          mkdir -p build

          if ! xcodebuild archive \
            -project Snapzy.xcodeproj \
            -scheme Snapzy \
            -configuration Release \
            -archivePath build/Snapzy.xcarchive \
            -derivedDataPath build/DerivedData \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            ONLY_ACTIVE_ARCH=NO \
            > build/archive.log 2>&1; then
            tail -100 build/archive.log
            exit 1
          fi

          tail -20 build/archive.log

          if [ ! -d "build/Snapzy.xcarchive" ]; then
            echo "::error::Archive not found at build/Snapzy.xcarchive"
            exit 1
          fi

      # --- Code Signing (conditional, for when Apple Developer account is available) ---
      - name: Import signing certificate
        if: env.HAS_DEVELOPER_ID_CERT == 'true'
        env:
          DEVELOPER_ID_P12: ${{ secrets.DEVELOPER_ID_P12 }}
          DEVELOPER_ID_PASSWORD: ${{ secrets.DEVELOPER_ID_PASSWORD }}
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          KEYCHAIN_PASSWORD=$(uuidgen)
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          echo "$DEVELOPER_ID_P12" | base64 --decode > $RUNNER_TEMP/certificate.p12
          security import $RUNNER_TEMP/certificate.p12 -P "$DEVELOPER_ID_PASSWORD" \
            -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

      - name: Export app
        run: |
          set -euo pipefail
          mkdir -p build build/export
          ARCHIVE_PATH="build/Snapzy.xcarchive"

          if [ ! -d "$ARCHIVE_PATH" ]; then
            echo "::error::Archive not found at $ARCHIVE_PATH. Check the Build archive step output."
            exit 1
          fi

          if [ "${HAS_DEVELOPER_ID_CERT}" = "true" ]; then
            # Signed export
            cat > build/ExportOptions.plist << 'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>developer-id</string>
            <key>signingStyle</key>
            <string>automatic</string>
          </dict>
          </plist>
          PLIST
            xcodebuild -exportArchive \
              -archivePath "$ARCHIVE_PATH" \
              -exportPath build/export \
              -exportOptionsPlist build/ExportOptions.plist
          else
            # Unsigned export - copy from archive directly
            ditto "$ARCHIVE_PATH/Products/Applications/Snapzy.app" build/Snapzy.app
          fi

      - name: Install create-dmg
        run: HOMEBREW_NO_AUTO_UPDATE=1 brew install create-dmg

      - name: Create DMG
        run: |
          set -euo pipefail
          APP_PATH="build/Snapzy.app"
          if [ -d "build/export/Snapzy.app" ]; then
            APP_PATH="build/export/Snapzy.app"
          fi

          if [ ! -d "$APP_PATH" ]; then
            echo "::error::Snapzy.app not found at expected path: $APP_PATH"
            exit 1
          fi

          DMG_NAME="Snapzy-v${{ steps.version.outputs.version }}.dmg"

          create-dmg \
            --volname "Snapzy" \
            --background "assets/dmg-background.png" \
            --window-size 660 400 \
            --icon-size 120 \
            --icon "Snapzy.app" 180 170 \
            --app-drop-link 480 170 \
            --no-internet-enable \
            "build/${DMG_NAME}" \
            "$APP_PATH"

          echo "dmg_path=build/${DMG_NAME}" >> "$GITHUB_ENV"
          echo "dmg_name=${DMG_NAME}" >> "$GITHUB_ENV"

      # --- Notarization (conditional, for when Apple Developer account is available) ---
      - name: Notarize DMG
        if: env.HAS_NOTARIZATION_CREDENTIALS == 'true'
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_ID_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          xcrun notarytool submit "${{ env.dmg_path }}" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_ID_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait
          xcrun stapler staple "${{ env.dmg_path }}"

      - name: Compute SHA256
        id: sha256
        run: |
          SHA=$(shasum -a 256 "${{ env.dmg_path }}" | awk '{print $1}')
          echo "sha256=$SHA" >> "$GITHUB_OUTPUT"
          echo "SHA-256: $SHA"

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: Snapzy-v${{ steps.version.outputs.version }}
          path: ${{ env.dmg_path }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: v${{ steps.version.outputs.version }}
          body_path: ${{ steps.changelog.outputs.changelog_path }}
          draft: false
          prerelease: false
          files: ${{ env.dmg_path }}
          generate_release_notes: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract build number
        id: build
        run: |
          BUILD=$(grep -m1 'CURRENT_PROJECT_VERSION' Snapzy.xcodeproj/project.pbxproj | sed 's/.*= //' | sed 's/;.*//' | tr -d ' ')
          echo "number=$BUILD" >> "$GITHUB_OUTPUT"
          echo "Build number: $BUILD"

      - name: Sign DMG with Sparkle EdDSA key
        id: sparkle_sign
        if: env.HAS_SPARKLE_KEY == 'true'
        env:
          SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}
        run: |
          # Write private key to temp file
          PRIVATE_KEY_FILE="$RUNNER_TEMP/sparkle_private_key.pem"
          echo "$SPARKLE_PRIVATE_KEY" > "$PRIVATE_KEY_FILE"

          # Build sign_update from Sparkle SPM checkout
          SPARKLE_SRC="build/DerivedData/SourcePackages/checkouts/Sparkle"
          if [ -d "$SPARKLE_SRC/sign_update" ]; then
            swift build --package-path "$SPARKLE_SRC/sign_update" -c release 2>/dev/null
            SIGN_UPDATE=$(swift build --package-path "$SPARKLE_SRC/sign_update" -c release --show-bin-path 2>/dev/null)/sign_update
          else
            echo "::warning::Sparkle sign_update source not found, trying generate_appcast binary"
            SIGN_UPDATE=""
          fi

          if [ -n "$SIGN_UPDATE" ] && [ -x "$SIGN_UPDATE" ]; then
            SIGNATURE=$("$SIGN_UPDATE" "${{ env.dmg_path }}" --ed-key-file "$PRIVATE_KEY_FILE" 2>/dev/null | grep "sparkle:edSignature=" | cut -d'"' -f2)
          else
            # Fallback: try the sign_update from artifacts if available
            SIGN_UPDATE_ALT=$(find build/DerivedData/SourcePackages/artifacts -name "sign_update" -type f 2>/dev/null | head -1)
            if [ -n "$SIGN_UPDATE_ALT" ] && [ -x "$SIGN_UPDATE_ALT" ]; then
              SIGNATURE=$("$SIGN_UPDATE_ALT" "${{ env.dmg_path }}" --ed-key-file "$PRIVATE_KEY_FILE" 2>/dev/null | grep "sparkle:edSignature=" | cut -d'"' -f2)
            else
              echo "::warning::Could not find sign_update binary, skipping signature"
              SIGNATURE=""
            fi
          fi

          echo "signature=$SIGNATURE" >> "$GITHUB_OUTPUT"
          rm -f "$PRIVATE_KEY_FILE"

          if [ -n "$SIGNATURE" ]; then
            echo "DMG signed successfully"
          else
            echo "::warning::DMG signature is empty"
          fi

      - name: Update appcast.xml
        run: |
          chmod +x scripts/update-appcast.sh
          ./scripts/update-appcast.sh \
            "${{ steps.version.outputs.version }}" \
            "${{ steps.build.outputs.number }}" \
            "${{ env.dmg_path }}" \
            "appcast.xml" \
            "${{ steps.sparkle_sign.outputs.signature }}"

      - name: Update Homebrew cask
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          SHA="${{ steps.sha256.outputs.sha256 }}"
          sed -i '' "s/version \".*\"/version \"${VERSION}\"/" Casks/snapzy.rb
          sed -i '' "s/sha256 \".*\"/sha256 \"${SHA}\"/" Casks/snapzy.rb

      - name: Update README install version
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          sed -i '' "s|/Snapzy/v[0-9][0-9.]*\/install.sh|/Snapzy/v${VERSION}/install.sh|g" README.md

      - name: Commit appcast and cask update
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add appcast.xml Casks/snapzy.rb README.md
          git commit -m "chore: update appcast, cask, and readme for v${{ steps.version.outputs.version }}"
          git push origin master
