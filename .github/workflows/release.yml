name: Release DMG

on:
  workflow_dispatch:
    inputs:
      version_type:
        description: 'Version bump type'
        required: true
        type: choice
        options:
          - patch
          - minor
          - major
      prerelease:
        description: 'Mark as pre-release'
        required: false
        type: boolean
        default: false

  push:
    branches: [master]

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  check-release-trigger:
    runs-on: ubuntu-latest
    outputs:
      should_release: ${{ steps.check.outputs.should_release }}
      version_type: ${{ steps.check.outputs.version_type }}
    steps:
      - name: Determine if release should run
        id: check
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "should_release=true" >> "$GITHUB_OUTPUT"
            echo "version_type=${{ inputs.version_type }}" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event_name }}" = "push" ]; then
            COMMIT_MSG="${{ github.event.head_commit.message }}"
            if echo "$COMMIT_MSG" | grep -qE "^release\((patch|minor|major)\):"; then
              TYPE=$(echo "$COMMIT_MSG" | sed -E 's/^release\((patch|minor|major)\):.*/\1/')
              echo "should_release=true" >> "$GITHUB_OUTPUT"
              echo "version_type=$TYPE" >> "$GITHUB_OUTPUT"
            else
              echo "should_release=false" >> "$GITHUB_OUTPUT"
              echo "version_type=" >> "$GITHUB_OUTPUT"
            fi
          fi

  release:
    needs: check-release-trigger
    if: needs.check-release-trigger.outputs.should_release == 'true'
    runs-on: macos-15
    timeout-minutes: 30
    permissions:
      contents: write
    env:
      HAS_DEVELOPER_ID_CERT: ${{ secrets.DEVELOPER_ID_P12 != '' && secrets.DEVELOPER_ID_PASSWORD != '' && 'true' || 'false' }}
      HAS_NOTARIZATION_CREDENTIALS: ${{ secrets.APPLE_ID != '' && secrets.APPLE_ID_PASSWORD != '' && secrets.APPLE_TEAM_ID != '' && 'true' || 'false' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Setup Secrets.xcconfig
        run: |
          cat > Snapzy/Config/Secrets.xcconfig << 'EOF'
          POLAR_ORG_ID = ${{ secrets.POLAR_ORG_ID }}
          POLAR_API_BASE_URL = https:/$()/api.polar.sh/v1/customer-portal
          POLAR_SANDBOX_API_BASE_URL = https:/$()/sandbox-api.polar.sh/v1/customer-portal
          EOF

      - name: Bump version
        id: version
        run: |
          chmod +x scripts/bump-version.sh
          OUTPUT=$(./scripts/bump-version.sh "${{ needs.check-release-trigger.outputs.version_type }}")
          VERSION=$(echo "$OUTPUT" | grep "^version=" | cut -d= -f2)
          PREV_VERSION=$(echo "$OUTPUT" | grep "^previous_version=" | cut -d= -f2)
          BUILD=$(echo "$OUTPUT" | grep "^build_number=" | cut -d= -f2)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "previous_version=$PREV_VERSION" >> "$GITHUB_OUTPUT"
          echo "build_number=$BUILD" >> "$GITHUB_OUTPUT"
          echo "Bumped: v${PREV_VERSION} -> v${VERSION} (build ${BUILD})"

      - name: Commit version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Snapzy.xcodeproj/project.pbxproj
          git commit -m "chore: bump version to v${{ steps.version.outputs.version }}"
          git push

      - name: Build archive
        run: |
          set -euo pipefail
          mkdir -p build

          if ! xcodebuild archive \
            -project Snapzy.xcodeproj \
            -scheme Snapzy \
            -configuration Release \
            -archivePath build/Snapzy.xcarchive \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            ONLY_ACTIVE_ARCH=NO \
            > build/archive.log 2>&1; then
            tail -100 build/archive.log
            exit 1
          fi

          tail -20 build/archive.log

          if [ ! -d "build/Snapzy.xcarchive" ]; then
            echo "::error::Archive not found at build/Snapzy.xcarchive"
            exit 1
          fi

      # --- Code Signing (conditional, for when Apple Developer account is available) ---
      - name: Import signing certificate
        if: env.HAS_DEVELOPER_ID_CERT == 'true'
        env:
          DEVELOPER_ID_P12: ${{ secrets.DEVELOPER_ID_P12 }}
          DEVELOPER_ID_PASSWORD: ${{ secrets.DEVELOPER_ID_PASSWORD }}
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          KEYCHAIN_PASSWORD=$(uuidgen)
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          echo "$DEVELOPER_ID_P12" | base64 --decode > $RUNNER_TEMP/certificate.p12
          security import $RUNNER_TEMP/certificate.p12 -P "$DEVELOPER_ID_PASSWORD" \
            -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

      - name: Export app
        run: |
          set -euo pipefail
          mkdir -p build build/export
          ARCHIVE_PATH="build/Snapzy.xcarchive"

          if [ ! -d "$ARCHIVE_PATH" ]; then
            echo "::error::Archive not found at $ARCHIVE_PATH. Check the Build archive step output."
            exit 1
          fi

          if [ "${HAS_DEVELOPER_ID_CERT}" = "true" ]; then
            # Signed export
            cat > build/ExportOptions.plist << 'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>developer-id</string>
            <key>signingStyle</key>
            <string>automatic</string>
          </dict>
          </plist>
          PLIST
            xcodebuild -exportArchive \
              -archivePath "$ARCHIVE_PATH" \
              -exportPath build/export \
              -exportOptionsPlist build/ExportOptions.plist
          else
            # Unsigned export - copy from archive directly
            ditto "$ARCHIVE_PATH/Products/Applications/Snapzy.app" build/Snapzy.app
          fi

      - name: Create DMG
        run: |
          set -euo pipefail
          APP_PATH="build/Snapzy.app"
          if [ -d "build/export/Snapzy.app" ]; then
            APP_PATH="build/export/Snapzy.app"
          fi

          if [ ! -d "$APP_PATH" ]; then
            echo "::error::Snapzy.app not found at expected path: $APP_PATH"
            exit 1
          fi

          DMG_NAME="Snapzy-v${{ steps.version.outputs.version }}.dmg"
          DMG_TEMP="build/dmg-temp"

          mkdir -p "$DMG_TEMP"
          ditto "$APP_PATH" "$DMG_TEMP/Snapzy.app"
          ln -s /Applications "$DMG_TEMP/Applications"

          hdiutil create \
            -volname "Snapzy" \
            -srcfolder "$DMG_TEMP" \
            -ov \
            -format UDZO \
            "build/${DMG_NAME}"

          echo "dmg_path=build/${DMG_NAME}" >> "$GITHUB_ENV"
          echo "dmg_name=${DMG_NAME}" >> "$GITHUB_ENV"

      # --- Notarization (conditional, for when Apple Developer account is available) ---
      - name: Notarize DMG
        if: env.HAS_NOTARIZATION_CREDENTIALS == 'true'
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_ID_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          xcrun notarytool submit "${{ env.dmg_path }}" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_ID_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait
          xcrun stapler staple "${{ env.dmg_path }}"

      - name: Generate changelog
        id: changelog
        run: |
          chmod +x scripts/generate-changelog.sh
          PREV_TAG="v${{ steps.version.outputs.previous_version }}"
          # Check if previous tag exists
          if git rev-parse "$PREV_TAG" >/dev/null 2>&1; then
            CHANGELOG=$(./scripts/generate-changelog.sh "$PREV_TAG")
          else
            CHANGELOG=$(./scripts/generate-changelog.sh)
          fi
          # Write to file for multiline handling
          echo "$CHANGELOG" > build/changelog.md
          echo "changelog_path=build/changelog.md" >> "$GITHUB_OUTPUT"

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: Snapzy-v${{ steps.version.outputs.version }}
          path: ${{ env.dmg_path }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: v${{ steps.version.outputs.version }}
          body_path: ${{ steps.changelog.outputs.changelog_path }}
          draft: false
          prerelease: ${{ inputs.prerelease || false }}
          files: ${{ env.dmg_path }}
          generate_release_notes: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
